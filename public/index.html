<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live TV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">&#9673; Live TV</div>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input id="search" type="text" placeholder="Cari channel...">
    </div>
    <div class="header-actions">
      <span id="last-updated" class="updated"></span>
      <button id="refresh-btn" class="refresh-btn" title="Refresh channel">↻</button>
    </div>
  </header>

  <main>
    <nav id="country-nav"></nav>
    <section id="browse">
      <div id="grid"></div>
    </section>

    <section id="player" class="hidden">
      <div class="player-bar">
        <button id="back"><span>&#8592;</span> Kembali</button>
        <div class="player-info">
          <span id="player-title"></span>
          <span id="player-sub"></span>
        </div>
      </div>
      <div class="player-stage">
        <div id="toast" class="hidden">
          <div class="spinner"></div>
          <span id="toast-msg"></span>
        </div>
        <div id="video-box">
          <video-player>
            <video-minimal-skin>
              <video id="video-el" slot="media" autoplay muted playsinline preload="auto"></video>
            </video-minimal-skin>
          </video-player>
        </div>
        <div id="yt-box"></div>
        <div id="blank">
          <span>Pilih channel</span>
        </div>
        <div id="panel" class="hidden">
          <div class="panel-head">
            <span id="panel-title"></span>
            <button id="panel-close">&times;</button>
          </div>
          <div id="panel-grid" class="card-grid"></div>
        </div>
      </div>
    </section>
  </main>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-minimal.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
